<style>
/* code block patches (reverts code blocks to look like how they used to in ~2022, since it looks better */
:root {
  --code-bg: #31343f;  /* thank you wayback machine. Thank you, thank you, thank you */
  --code-border: #44434d;
  --code-text: #dee2f7;
}

/* Inline code */
:not(pre, figure) > code {
  padding: 0.2em 0.15em;
  font-weight: 400;
  background-color: var(--code-bg) !important;
  border: 1px solid var(--code-border) !important;
  border-radius: 4px;
}

/* Code blocks */
.highlight,
pre.highlight,
div.highlighter-rouge pre.highlight {
  background-color: var(--code-bg) !important;
  color: var(--code-text) !important;
}

/* This is to make sure we don't have any double backgrounds */
pre code {
  background: transparent !important;
  border: 0 !important;
}

/* This CSS is to add GFM alerts */
  
markdown-alert {
  padding: 0.5em 1em;
  margin-bottom: 1em;
  border-left: 0.25em solid;
  border-radius: 4px;
  background-color: transparent;
}

.markdown-alert-title {
  display: flex;
  align-items: center;
  font-weight: 600;
  margin-bottom: 0.5em;
  margin-top: 0;
}

.markdown-alert-title svg {
  margin-right: 0.5em;
  flex-shrink: 0;
}

/* light mode is the base */
.markdown-alert-note {
  border-color: #0969da;
  background-color: rgba(9, 105, 218, 0.1);
}
.markdown-alert-note .markdown-alert-title { color: #0969da; }

.markdown-alert-tip {
  border-color: #1a7f37;
  background-color: rgba(26, 127, 55, 0.1);
}
.markdown-alert-tip .markdown-alert-title { color: #1a7f37; }

.markdown-alert-important {
  border-color: #8250df;
  background-color: rgba(130, 80, 223, 0.1);
}
.markdown-alert-important .markdown-alert-title { color: #8250df; }

.markdown-alert-warning {
  border-color: #9a6700;
  background-color: rgba(154, 103, 0, 0.1);
}
.markdown-alert-warning .markdown-alert-title { color: #9a6700; }

.markdown-alert-caution {
  border-color: #cf222e;
  background-color: rgba(207, 34, 46, 0.1);
}
.markdown-alert-caution .markdown-alert-title { color: #cf222e; }

/* make it look good when dark mode is chosen */
@media (prefers-color-scheme: dark) {
  .markdown-alert-note {
    border-color: #4493f8;
    background-color: rgba(68, 147, 248, 0.1);
  }
  .markdown-alert-note .markdown-alert-title { color: #4493f8; }
  
  .markdown-alert-tip {
    border-color: #3fb950;
    background-color: rgba(63, 185, 80, 0.1);
  }
  .markdown-alert-tip .markdown-alert-title { color: #3fb950; }
  
  .markdown-alert-important {
    border-color: #a371f7;
    background-color: rgba(163, 113, 247, 0.1);
  }
  .markdown-alert-important .markdown-alert-title { color: #a371f7; }
  
  .markdown-alert-warning {
    border-color: #d29922;
    background-color: rgba(210, 153, 34, 0.1);
  }
  .markdown-alert-warning .markdown-alert-title { color: #d29922; }
  
  .markdown-alert-caution {
    border-color: #f85149;
    background-color: rgba(248, 81, 73, 0.1);
  }
  .markdown-alert-caution .markdown-alert-title { color: #f85149; }
}
</style>

<script>
/* GFM Alert transformation script yay! */
document.addEventListener('DOMContentLoaded', function() {
  const alertIcons = {
    note: '<svg class="octicon octicon-info mr-2" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>',
    tip: '<svg class="octicon octicon-light-bulb mr-2" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M8 1.5c-2.363 0-4 1.69-4 3.75 0 .984.424 1.625.984 2.304l.214.253c.223.264.47.556.673.848.284.411.537.896.621 1.49a.75.75 0 0 1-1.484.211c-.04-.282-.163-.547-.37-.847a8.456 8.456 0 0 0-.542-.68c-.084-.1-.173-.205-.268-.32C3.201 7.75 2.5 6.766 2.5 5.25 2.5 2.31 4.863 0 8 0s5.5 2.31 5.5 5.25c0 1.516-.701 2.5-1.328 3.259-.095.115-.184.22-.268.319-.207.245-.383.453-.541.681-.208.3-.33.565-.37.847a.751.751 0 0 1-1.485-.212c.084-.593.337-1.078.621-1.489.203-.292.45-.584.673-.848.075-.088.147-.173.213-.253.561-.679.985-1.32.985-2.304 0-2.06-1.637-3.75-4-3.75ZM5.75 12h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1 0-1.5ZM6 15.25a.75.75 0 0 1 .75-.75h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1-.75-.75Z"></path></svg>',
    important: '<svg class="octicon octicon-report mr-2" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>',
    warning: '<svg class="octicon octicon-alert mr-2" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0 1 14.082 15H1.918a1.75 1.75 0 0 1-1.543-2.575Zm1.763.707a.25.25 0 0 0-.44 0L1.698 13.132a.25.25 0 0 0 .22.368h12.164a.25.25 0 0 0 .22-.368Zm.53 3.996v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 11a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>',
    caution: '<svg class="octicon octicon-stop mr-2" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M4.47.22A.749.749 0 0 1 5 0h6c.199 0 .389.079.53.22l4.25 4.25c.141.14.22.331.22.53v6a.749.749 0 0 1-.22.53l-4.25 4.25A.749.749 0 0 1 11 16H5a.749.749 0 0 1-.53-.22L.22 11.53A.749.749 0 0 1 0 11V5c0-.199.079-.389.22-.53Zm.84 1.28L1.5 5.31v5.38l3.81 3.81h5.38l3.81-3.81V5.31L10.69 1.5ZM8 4a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>'
  };

  const alertTitles = {
    note: 'Note',
    tip: 'Tip',
    important: 'Important',
    warning: 'Warning',
    caution: 'Caution'
  };

  document.querySelectorAll('blockquote').forEach(function(blockquote) {
    const firstChild = blockquote.firstElementChild;
    if (!firstChild || firstChild.tagName !== 'P') return;

    const text = firstChild.textContent.trim();
    const match = text.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);

    if (match) {
      const alertType = match[1].toLowerCase();
      const alertDiv = document.createElement('div');
      alertDiv.className = `markdown-alert markdown-alert-${alertType}`;

      /* Create title paragraph with icon */
      const titleP = document.createElement('p');
      titleP.className = 'markdown-alert-title';
      titleP.innerHTML = `${alertIcons[alertType]}${alertTitles[alertType]}`;
      alertDiv.appendChild(titleP);

      firstChild.innerHTML = firstChild.innerHTML.replace(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(<br\s*\/?>)?\s*/i, '');

      /* if the first section is now empty, we ofc remove it */
      if (!firstChild.textContent.trim()) firstChild.remove();
    
      /* and we also need to move all remaining children to the alert div */
      while (blockquote.firstChild) alertDiv.appendChild(blockquote.firstChild);
      blockquote.parentNode.replaceChild(alertDiv, blockquote); /* finally, replace the blockquote with the alert div */
    }
  });
});
</script>
